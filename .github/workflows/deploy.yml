name: Deploy r3d/ops Blog to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build Astro Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: kbm.blog/package-lock.json

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        working-directory: kbm.blog
        # --force is required when upgrading across Astro major versions (4→5)
        # because peer-dep ranges in @astrojs/* may not yet be fully resolved
        # in the lock file generated by the old version.
        run: npm install --force

      - name: Generate Astro type declarations
        working-directory: kbm.blog
        run: npx astro sync

      - name: Type check
        working-directory: kbm.blog
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build site
        working-directory: kbm.blog
        run: npm run build
        env:
          NODE_ENV: production

      # GitHub Pages requires a .nojekyll file at the root of the output
      # so it does not try to process the static output with Jekyll.
      - name: Ensure .nojekyll exists
        run: touch kbm.blog/dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: kbm.blog/dist

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on direct pushes to main — skip for pull requests
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
